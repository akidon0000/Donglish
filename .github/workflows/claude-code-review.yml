name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            結果をこのPRにコメントしてください。

            ## コメントルール
            - 指摘事項がある場合: 各指摘をガイドラインの観点に基づき日本語で具体的に説明し、改善提案を含めてコメントしてください。
            - 指摘事項がない場合: 「レビュー完了：問題は見つかりませんでした。」とコメントしてください。

      - name: Add thumbs up if no issues
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest comment from the bot
          LATEST_COMMENT=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[-1].body // ""')

          if echo "$LATEST_COMMENT" | grep -q "問題は見つかりませんでした"; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions \
              -f content='+1'
            echo "👍 No issues found - added thumbs up reaction"
          else
            echo "Issues found - skipping thumbs up"
          fi
