name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record comment count before review
        id: before
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            ## コメントルール
            - 指摘事項がある場合: 各指摘をガイドラインの観点に基づき日本語で具体的に説明し、改善提案を含めてコメントしてください。
            - 指摘事項がない場合: このPRにはコメントしないでください。
            - インラインコメント内に `@claude` を含めないでください。

            ## 自動修正PR作成
            - レビュー完了後、修正が明確な指摘（MUST FIX / SHOULD FIX）がある場合、レビューコメントに加えて修正PRも作成してください。
            - 全ての指摘をまとめて1つの修正PRとして作成してください。
            - スコープが広すぎる・曖昧な指摘は修正PRに含めず、レビューコメントのみにしてください。

            ### 修正PRの作成手順
            1. 元PRのブランチ `${{ github.head_ref }}` をベースに、新しいブランチ `claude/fix/${{ github.event.pull_request.number }}-review-fixes` を作成
            2. 指摘箇所を修正してコミット
            3. 元PRのブランチ `${{ github.head_ref }}` に向けてPRを作成
            4. 各レビューコメント（インラインコメント）に対する返信として `🔧 修正PRを作成しました → #<PR番号>` を投稿（`gh api` で対象コメントへのリプライとして投稿すること）

            ### 絶対ルール
            - 元PRのブランチへの直接コミット・直接プッシュは一切禁止
            - 必ず新しいブランチを作成し、修正PRを作成すること

      - name: Add thumbs up if no issues
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT_AFTER=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq 'length')

          if [ "$COUNT_AFTER" -le "${{ steps.before.outputs.count }}" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions \
              -f content='+1'
          fi
