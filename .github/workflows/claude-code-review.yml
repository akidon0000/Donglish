name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        run: |
          echo "=== claude path ===" && which claude || echo "claude not found"
          echo "=== claude version ===" && claude --version || echo "version check failed"
          echo "=== test ===" && claude -p "こんにちは" 2>&1 | tee /tmp/review_result.txt
          echo "=== exit code: $? ==="

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review_result.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Code Review\n\n${review}\n\n---\n*Reviewed by Claude Code (self-hosted runner)*`
            });

      - name: Cleanup
        if: always()
        run: rm -f /tmp/review_result.txt
