name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record comment count before review
        id: before
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            ## コメントルール
            - 指摘事項がある場合: 各指摘をガイドラインの観点に基づき日本語で具体的に説明し、改善提案を含めてコメントしてください。
            - 指摘事項がない場合: このPRにはコメントしないでください。
            - インラインコメント内に `@claude` を含めないでください。

            ## 自動修正（@claude auto-patch）
            - レビュー完了後、修正が明確な指摘（MUST FIX / SHOULD FIX）ごとに、PRコメント（issue comment）として以下の形式で投稿してください。
            - 1つの指摘につき1つのPRコメントを投稿してください。複数の指摘をまとめないでください。
            - スコープが広すぎる・曖昧な指摘にはPRコメントを投稿しないでください。
            - PRコメントの投稿には `gh issue comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "<コメント本文>"` を使用してください。

            ### フォーマット
            ```
            @claude auto-patch <何を・どのように直すか（具体的に）>
            ```

      - name: Add thumbs up if no issues
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT_AFTER=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq 'length')

          if [ "$COUNT_AFTER" -le "${{ steps.before.outputs.count }}" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions \
              -f content='+1'
          fi
