name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt

          cat > /tmp/review_prompt.txt << 'PROMPT'
          あなたはiOSアプリ開発の専門家です。以下のgit diffをコードレビューしてください。

          レビュー観点:
          - バグ・ロジックエラー
          - Swift/SwiftUIのベストプラクティス
          - パフォーマンス上の問題
          - セキュリティ上の問題
          - 可読性・保守性

          問題がある場合はファイル名と行番号を明示してください。
          問題がなければ「LGTM」と返してください。

          ---
          PROMPT

          cat /tmp/pr_diff.txt >> /tmp/review_prompt.txt

          claude -p "$(cat /tmp/review_prompt.txt)" > /tmp/review_result.txt 2>&1

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review_result.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Code Review\n\n${review}\n\n---\n*Reviewed by Claude Code (self-hosted runner)*`
            });

      - name: Cleanup
        if: always()
        run: rm -f /tmp/pr_diff.txt /tmp/review_prompt.txt /tmp/review_result.txt
