name: Label Claude Code PRs

on:
  pull_request:
    types: [opened]

jobs:
  label:
    if: github.actor == 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Claude Code label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --add-label "Claude Code"
